<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 StudyHub — Menu Principal</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">📚 <span>Study</span>Hub</a>
    </div>
  </header>

  <!-- HERO -->
  <section class="index-hero">
    <h1>Meus Estudos</h1>
    <p>Organize seus conteúdos, acesse suas matérias e estude de forma estruturada.</p>
  </section>

  <!-- GRID DE MATÉRIAS -->
  <!-- Para adicionar uma nova matéria: copie um <a class="menu-card"> e ajuste os dados -->
  <nav class="menu-grid">

    <!-- MATEMÁTICA -->
    <a href="matematica.html" class="menu-card" data-color="red">
      <div class="card-icon">🔢</div>
      <div class="card-title">Matemática</div>
      <div class="card-desc">Operações fundamentais: soma, subtração, multiplicação, divisão, frações e potenciação.</div>
      <div class="card-footer">
        <div class="card-arrow">Acessar →</div>
      </div>
    </a>

    <!-- EXEMPLO: descomente e edite para adicionar uma nova matéria
    <a href="portugues.html" class="menu-card" data-color="blue">
      <div class="card-icon">📝</div>
      <div class="card-title">Português</div>
      <div class="card-desc">Gramática, ortografia, redação e interpretação de textos.</div>
      <div class="card-footer">
        <div class="card-arrow">Acessar →</div>
        <span class="card-tag">Em breve</span>
      </div>
    </a>

    <a href="historia.html" class="menu-card" data-color="orange">
      <div class="card-icon">🏛️</div>
      <div class="card-title">História</div>
      <div class="card-desc">Do Brasil ao mundo: fatos, períodos e civilizações.</div>
      <div class="card-footer">
        <div class="card-arrow">Acessar →</div>
        <span class="card-tag">Em breve</span>
      </div>
    </a>

    <a href="ciencias.html" class="menu-card" data-color="green">
      <div class="card-icon">🔬</div>
      <div class="card-title">Ciências</div>
      <div class="card-desc">Biologia, física e química de forma integrada e acessível.</div>
      <div class="card-footer">
        <div class="card-arrow">Acessar →</div>
        <span class="card-tag">Em breve</span>
      </div>
    </a>
    -->

    <!-- Mensagem quando nenhuma matéria é encontrada na busca -->
    <div class="no-results">
      😕 Nenhuma matéria encontrada para "<span id="no-results-term"></span>"
    </div>

  </nav>

  <!-- FOOTER -->
  <footer class="footer">
    <p>📚 StudyHub — Seu espaço pessoal de estudos</p>
  </footer>

  <script>
    // Atualiza contador de matérias dinamicamente
    const cards = document.querySelectorAll('.menu-card');
    const counter = document.getElementById('total-materias');
    if (counter && cards.length > 0) {
      counter.textContent = cards.length;
    }

    // Mostra o termo buscado no no-results
    const searchInput = document.querySelector('.search-input');
    const noResultsTerm = document.getElementById('no-results-term');
    if (searchInput && noResultsTerm) {
      searchInput.addEventListener('input', () => {
        noResultsTerm.textContent = searchInput.value;
      });
    }
  </script>
</body>
</html>
